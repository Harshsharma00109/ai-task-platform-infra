apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neuralq-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: neuralq-deployments
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/neuralq-infra.git
    targetRevision: HEAD
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: neuralq
  syncPolicy:
    automated:
      prune: true          # Remove resources no longer in Git
      selfHeal: true       # Revert manual cluster changes
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
