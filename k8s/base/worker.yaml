apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: neuralq
  labels:
    app: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 60   # Allow in-flight jobs to finish
      containers:
        - name: worker
          image: ghcr.io/YOUR_ORG/neuralq-worker:latest   # updated by CI
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: neuralq-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import redis, os
                  r = redis.Redis(host=os.getenv('REDIS_HOST','redis-service'), port=int(os.getenv('REDIS_PORT',6379)))
                  r.ping()
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: neuralq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
