apiVersion: v1
kind: ConfigMap
metadata:
  name: neuralq-config
  namespace: neuralq
data:
  NODE_ENV: "production"
  PORT: "5000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  MONGODB_URI: "mongodb://mongo-service:27017/ai_task_platform"
  JWT_EXPIRES_IN: "7d"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  ALLOWED_ORIGINS: "https://neuralq.yourdomain.com"
  WORKER_CONCURRENCY: "5"
  POLL_INTERVAL_SECONDS: "0.3"
