apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: neuralq-staging

patchesStrategicMerge:
  - backend-patch.yaml
  - worker-patch.yaml

# Staging uses lower resource limits and fewer replicas
images:
  - name: ghcr.io/YOUR_ORG/neuralq-backend
    newTag: "develop-latest"
  - name: ghcr.io/YOUR_ORG/neuralq-worker
    newTag: "develop-latest"
  - name: ghcr.io/YOUR_ORG/neuralq-frontend
    newTag: "develop-latest"
