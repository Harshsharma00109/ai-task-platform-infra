apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: neuralq-staging
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
